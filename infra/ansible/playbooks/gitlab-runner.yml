---
- name: Configure GitLab Runner
  hosts: dev
  gather_facts: false
  become: true

  pre_tasks:
    - name: Validate GitLab Runner token
      ansible.builtin.assert:
        that:
          - gitlab_runner_token is defined
          - gitlab_runner_token | length > 0
        fail_msg: Environment variable GITLAB_RUNNER_TOKEN is required
      delegate_to: localhost
      become: false
      run_once: true

    - name: Validate effective nginx site inventory variables
      ansible.builtin.assert:
        that:
          - nginx_sites is defined
          - nginx_sites | type_debug == 'list'
          - nginx_sites | length > 0
        fail_msg: >-
          nginx_sites must be defined as a non-empty list in environment group_vars,
          for example group_vars/dev.yml, before running this playbook.
        success_msg: "Loaded {{ nginx_sites | length }} nginx site definition(s) from inventory variables."

    - name: Show effective nginx site names
      ansible.builtin.debug:
        msg: "Effective nginx_sites entries: {{ nginx_sites | map(attribute='name') | list }}"

  roles:
    - role: nginx
    - role: certbot
    - role: gitlab_runner
